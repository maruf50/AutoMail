<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Auto Email Sender</title>

  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <main class="container">
    <section class="card">
      <h1>Auto Email Sender</h1>
      <p>Create a new email campaign.</p>

      <form id="campaignForm">
        <label for="name">Campaign name</label>
        <input
          id="name"
          name="name"
          type="text"
          placeholder="Summer promotion"
          required
        >

        <label for="senderName">Sender name</label>
        <input
          id="senderName"
          name="senderName"
          type="text"
          placeholder="My Company"
        >

        <label for="senderEmail">Sender email</label>
        <input
          id="senderEmail"
          name="senderEmail"
          type="email"
          placeholder="sender@example.com"
          required
        >

        <label for="subject">Subject</label>
        <input
          id="subject"
          name="subject"
          type="text"
          placeholder="A message for you"
          required
        >

        <label for="message">Message</label>
        <textarea
          id="message"
          name="message"
          rows="7"
          placeholder="Write your email message..."
          required
        ></textarea>

        <label for="recipients">
          Recipients — one email per line
        </label>

        <textarea
          id="recipients"
          name="recipients"
          rows="6"
          placeholder="first@example.com&#10;second@example.com"
          required
        ></textarea>

        <label for="intervalSeconds">
          Interval between emails in seconds
        </label>

        <input
          id="intervalSeconds"
          name="intervalSeconds"
          type="number"
          value="30"
          min="1"
          required
        >

        <button id="submitButton" type="submit">
          Create campaign
        </button>
      </form>

      <div id="result" class="result" hidden></div>
    </section>

    <section class="card">
      <div class="section-heading">
        <h2>Saved campaigns</h2>
        <button id="refreshButton" type="button">
          Refresh
        </button>
      </div>

      <div id="campaignList">
        Loading campaigns...
      </div>
    </section>
  </main>

  <script src="./js/app.js"></script>
</body>
</html>
